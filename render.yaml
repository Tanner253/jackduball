# Render Blueprint — same setup as BBALL (Node web service, NOT Docker).
# MongoDB Atlas free M0 → paste MONGODB_URI in the dashboard when prompted.
services:
  - type: web
    name: jackduball
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: jackduball
      - key: ALLOWED_ORIGINS
        value: https://jackduball.vercel.app
      - key: NODE_VERSION
        value: "22"
